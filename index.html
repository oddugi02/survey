<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미디어 디자인 클래스 친구들에게 하는 설문조사</title>
    <!-- Pretendard 폰트 불러오기 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob shape1"></div>
        <div class="blob shape2"></div>
        <div class="blob shape3"></div>
    </div>

    <main class="container">
        <header class="survey-header fade-in-section">
            <span class="badge">설문 조사</span>
            <h1><span class="highlight">미디어 디자인 클래스 친구들에게 하는 설문조사</span></h1>
            <p>일상에서 느끼는 감정과 생각, 여러분의 솔직한 이야기를 들려주세요.<br>응답해주신 내용은 제게 큰 도움이 됩니다.</p>
        </header>

        <!-- 제출 완료 메시지 (초기엔 숨김) -->
        <div id="success-message" class="question-card" style="display: none; text-align: center; padding: 4rem 2rem;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🎉</div>
            <h2 style="font-size: 2rem; margin-bottom: 1rem; color: var(--primary-color);">소중한 답변 감사합니다!</h2>
            <p style="font-size: 1.15rem; color: var(--text-sub);">설문이 성공적으로 제출되었습니다.<br>참여해 주셔서 진심으로 감사드립니다.</p>
        </div>

        <!-- Formsubmit 연동 -->
        <form id="survey-form" action="https://formsubmit.co/oddugi02@gmail.com" method="POST" class="survey-form">
            <!-- Formsubmit 셋업 -->
            <input type="hidden" name="_subject" value="새로운 설문 응답이 도착했습니다!">
            <input type="hidden" name="_template" value="box">
            <!-- 제출 후 돌아갈 URL을 현재 주소로 고정하기 위한 필드 -->
            <input type="hidden" name="_next" id="next-url" value="">
            <input type="hidden" name="_captcha" value="false">
            
            <section class="question-card fade-in-section">
                <div class="q-header">
                    <span class="q-num">Q1</span>
                    <label for="q1">최근 일주일 간 자신이 자주 사용한 앱이나 웹사이트는 무엇인가요?</label>
                </div>
                <div class="q-body">
                    <input type="text" id="q1" name="1.최근_자주사용한_앱_웹사이트" placeholder="예: 유튜브, 넷플릭스, 인스타그램 등" required>
                </div>
            </section>

            <section class="question-card fade-in-section">
                <div class="q-header">
                    <span class="q-num">Q2</span>
                    <label>그 앱이나 웹사이트를 자주 사용하는 이유가 뭐라고 생각하시나요?</label>
                </div>
                <div class="q-body radio-group">
                    <label class="radio-label">
                        <input type="radio" name="2.자주사용하는_이유" value="나의 취미/관심사와 관련되어 있다" required>
                        <span class="radio-custom"></span> 나의 취미/관심사와 관련되어 있다
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="2.자주사용하는_이유" value="사용이 간편하다">
                        <span class="radio-custom"></span> 사용이 간편하다
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="2.자주사용하는_이유" value="정서적으로 안정된다">
                        <span class="radio-custom"></span> 정서적으로 안정된다
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="2.자주사용하는_이유" value="정보를 많이 얻을 수 있다">
                        <span class="radio-custom"></span> 정보를 많이 얻을 수 있다
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="2.자주사용하는_이유" value="아름답다">
                        <span class="radio-custom"></span> 아름답다
                    </label>
                </div>
            </section>

            <section class="question-card fade-in-section">
                <div class="q-header">
                    <span class="q-num">Q3</span>
                    <label for="q3">학과생활을 하면서 가장 고민되거나 스트레스 받는 사항은 어떤것인가요?</label>
                </div>
                <div class="q-body">
                    <textarea id="q3" name="3.학과생활_고민_스트레스" rows="4" placeholder="자유롭게 작성해주세요." required></textarea>
                </div>
            </section>

            <section class="question-card fade-in-section">
                <div class="q-header">
                    <span class="q-num">Q4</span>
                    <label for="q4">질문3에서 답변하신 사항을 마법사처럼 맘대로 바꿀 수 있다면 어떻게 바꾸고 싶으신가요?</label>
                </div>
                <div class="q-body">
                    <textarea id="q4" name="4.맘대로_바꾸고싶은_사항" rows="4" placeholder="어떤 마법을 부리고 싶으신가요?" required></textarea>
                </div>
            </section>

            <section class="question-card fade-in-section">
                <div class="q-header">
                    <span class="q-num">Q5</span>
                    <label for="q5">학과를 떠나, 20대에 이루고 싶은 목표나 삶의 가치가 무엇인가요?</label>
                </div>
                <div class="q-body">
                    <textarea id="q5" name="5.20대_목표나_가치" rows="4" placeholder="본인만의 목표나 가치관을 공유해주세요." required></textarea>
                </div>
            </section>

            <section class="question-card fade-in-section">
                <div class="q-header">
                    <span class="q-num">Q6</span>
                    <label>과제를 하는 도중에 종종 불안을 느끼시나요?</label>
                </div>
                <div class="q-body radio-group row-layout">
                    <label class="radio-label">
                        <input type="radio" name="6.과제중_불안감" value="네" required>
                        <span class="radio-custom"></span> 네
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="6.과제중_불안감" value="아니요">
                        <span class="radio-custom"></span> 아니요
                    </label>
                </div>
            </section>

            <section class="question-card fade-in-section">
                <div class="q-header">
                    <span class="q-num">Q7</span>
                    <label>현실적인 도움을 주는 프로그램과 정서적인 도움을 주는 프로그램 중 하나만 고른다면 어떤것을 더 자주 사용하실 것 같나요?</label>
                </div>
                <div class="q-body radio-group">
                    <label class="radio-label">
                        <input type="radio" name="7.선호하는_프로그램" value="현실적인 도움이 좋아요" required>
                        <span class="radio-custom"></span> 현실적인 도움이 좋아요
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="7.선호하는_프로그램" value="정서적인 도움이 좋아요">
                        <span class="radio-custom"></span> 정서적인 도움이 좋아요
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="7.선호하는_프로그램" value="못 고르겠어요">
                        <span class="radio-custom"></span> 못 고르겠어요
                    </label>
                </div>
            </section>

            <section class="question-card fade-in-section">
                <div class="q-header">
                    <span class="q-num">Q8</span>
                    <label>학교 및 학과생활에 지쳤나요?</label>
                </div>
                <div class="q-body radio-group">
                    <label class="radio-label">
                        <input type="radio" name="8.학교생활_지친정도" value="별로 지치진 않았어요" required>
                        <span class="radio-custom"></span> 별로 지치진 않았어요
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="8.학교생활_지친정도" value="네 조금..">
                        <span class="radio-custom"></span> 네 조금..
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="8.학교생활_지친정도" value="꽤 지쳤어요">
                        <span class="radio-custom"></span> 꽤 지쳤어요
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="8.학교생활_지친정도" value="많이 지쳐요">
                        <span class="radio-custom"></span> 많이 지쳐요
                    </label>
                </div>
            </section>

            <section class="question-card fade-in-section">
                <div class="q-header">
                    <span class="q-num">Q9</span>
                    <label for="q9">요즘 내 무의식이 깊게 원하는 것은 무엇이라고 생각하시나요?</label>
                </div>
                <div class="q-body">
                    <textarea id="q9" name="9.무의식이_원하는것" rows="4" placeholder="당신의 깊은 마음을 들여다보고 적어주세요." required></textarea>
                </div>
            </section>

            <section class="question-card fade-in-section">
                <div class="q-header">
                    <span class="q-num">Q10</span>
                    <label for="q10">혹시 취미가 있으신가요?</label>
                </div>
                <div class="q-body">
                    <textarea id="q10" name="10.취미" rows="3" placeholder="어떤 취미를 가지고 계신가요?" required></textarea>
                </div>
            </section>

            <section class="question-card fade-in-section">
                <div class="q-header">
                    <span class="q-num">Q11</span>
                    <label>여러분의 성함과 닉네임을 알려주세요!</label>
                </div>
                <div class="q-body radio-group row-layout" style="gap: 1rem;">
                    <input type="text" id="q11_name" name="11.성함" placeholder="성함" required style="flex: 1;">
                    <input type="text" id="q11_nickname" name="12.닉네임" placeholder="닉네임" required style="flex: 1;">
                </div>
            </section>

            <div class="submit-wrapper fade-in-section">
                <button type="submit" class="submit-btn">
                    <span>답변 제출하기</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <p class="submit-hint">제출하시면 수정할 수 없습니다.</p>
            </div>
        </form>
    </main>
    <script src="script.js"></script>
</body>
</html>
